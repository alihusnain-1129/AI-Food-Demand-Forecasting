<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
}

.container{
width:300px;
margin:100px auto;
background:white;
padding:20px;
border-radius:5px;
box-shadow:0px 0px 10px #ccc;
}

input{
width:100%;
padding:10px;
margin-top:10px;
box-sizing: border-box;
}

button{
width:100%;
padding:10px;
margin-top:15px;
background:#007bff;
color:white;
border:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Login</h2>

{% if error %}
<p style="color:red">{{error}}</p>
{% endif %}

<form method="POST">

{% csrf_token %}

<label>Username</label>
<input type="text" name="username" required>

<label>Password</label>
<input type="password" name="password" required>

<button type="submit">Login</button>

</form>
<a href="/signup/">Create Account</a>
</div>

</body>

</html>
